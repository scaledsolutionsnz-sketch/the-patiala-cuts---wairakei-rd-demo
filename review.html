<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave a Review | The Patiala Cuts, Wairakei Rd</title>
<meta name="description" content="Tell us how your visit to The Patiala Cuts went — your feedback helps our Wairakei Rd salon keep getting better." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2314110f'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='58' fill='%23c0975a' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="intro-done">

<header class="nav scrolled">
  <div class="nav-inner">
    <a class="brand" href="index.html">The Patiala <span>Cuts</span><small>Wairakei Rd · Christchurch</small></a>
    <nav class="nav-links">
      <a href="index.html#services">Services</a>
      <a href="index.html#about">About</a>
      <a href="index.html#reviews">Reviews</a>
      <a class="nav-phone" href="tel:+6439263651">03 926 3651</a>
    </nav>
    <button class="nav-toggle" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</header>

<section class="page-hero">
  <div class="wrap">
    <span class="eyebrow">Your feedback</span>
    <h1>How was your <em>visit?</em></h1>
    <p>Tap a rating below. It only takes a moment and it genuinely helps a small salon like ours.</p>
  </div>
</section>

<section class="section section--bone">
  <div class="wrap">
    <div class="star-picker">
      <button class="star-btn" data-rating="1" aria-label="1 star">★</button>
      <button class="star-btn" data-rating="2" aria-label="2 stars">★</button>
      <button class="star-btn" data-rating="3" aria-label="3 stars">★</button>
      <button class="star-btn" data-rating="4" aria-label="4 stars">★</button>
      <button class="star-btn" data-rating="5" aria-label="5 stars">★</button>
    </div>
    <p class="rating-meta">1 = not great &nbsp;·&nbsp; 5 = loved it</p>
  </div>
</section>

<footer class="site">
  <div class="wrap">
    <div class="foot-bottom" style="border:0;padding-top:0">
      <span>© <span data-year>2026</span> The Patiala Cuts — Wairakei Rd.</span>
      <span><a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="index.html">Home</a></span>
    </div>
  </div>
</footer>

<script>
  // 4-5 stars -> Google review; 1-3 -> private feedback form
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER/review";
  document.querySelectorAll(".star-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var r = parseInt(btn.getAttribute("data-rating"), 10);
      if (r >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
      else { window.location.href = "private.html?rating=" + r; }
    });
  });
</script>
<script src="main.js"></script>
</body>
</html>
